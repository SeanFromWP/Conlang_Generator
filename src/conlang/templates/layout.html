<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %} | {{ app_name }}</title>
    {% block extra_css %}
        <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    {% endblock %}
    <style>
        :root { --sidebar-w:260px; --primary:#1a73e8; --primary-glass:rgba(26,115,232,0.12); --primary-border:rgba(26,115,232,0.4); --bg:#f8f9fa; --border:#dadce0; --text-main:#202124; --text-sub:#5f6368; --top-bar-h:70px; }
        * { box-sizing:border-box; }
        body { font-family:"Segoe UI","Tahoma",sans-serif; margin:0; display:flex; height:100vh; background:var(--bg); color:var(--text-main); }
        [data-i18n]:empty::before { content:"\00a0"; }
        .sidebar { width:var(--sidebar-w); background:white; border-right:1px solid var(--border); display:flex; flex-direction:column; }
        .sidebar-header { padding:24px; border-bottom:1px solid #f1f3f4; font-weight:700; color:var(--primary); font-size:1.1rem; }
        .main { flex-grow:1; overflow-y:auto; display:flex; flex-direction:column; }
        .top-bar { height:var(--top-bar-h); min-height:var(--top-bar-h); max-height:var(--top-bar-h); background:rgba(255,255,255,0.8); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 40px; position:sticky; top:0; z-index:100; }
        .page-title-area { font-size:1.25rem; font-weight:700; display:flex; align-items:center; }
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; height:38px; padding:0 20px; border-radius:8px; border:1px solid transparent; font-weight:600; font-family:inherit; cursor:pointer; transition:0.2s; font-size:0.9rem; line-height:1; white-space:nowrap; }
        .btn-save { background:var(--primary); color:white; box-shadow:0 2px 6px rgba(26,115,232,0.2); border-color:var(--primary); }
        .btn-save:hover { background:#1557b0; }
        .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text-sub); }
        .btn-outline:hover { background:#f1f3f4; border-color:var(--text-sub); }
        .section-header { border-left:6px solid var(--primary); padding-left:15px; margin:35px 0 15px; }
        .section-header h2 { margin:0; font-size:1.25rem; font-weight:700; color:var(--text-main); }
        .card { background:white; padding:25px; border-radius:12px; border:1px solid var(--border); margin-bottom:25px; }
        .pill-label { cursor:pointer; display:inline-flex; align-items:center; padding:8px 18px; border-radius:20px; border:1px solid var(--border); background:white; font-size:0.9rem; transition:0.3s; user-select:none; color:var(--text-sub); }
        .pill-label input { display:none; }
        .pill-label:has(input:checked) { background:var(--primary-glass); color:var(--primary); border-color:var(--primary); font-weight:600; }
        .grid-flex { display:flex; flex-wrap:wrap; gap:10px; }
        .nav-list { list-style:none; padding:12px; margin:0; }
        .nav-item a { display:block; padding:12px; border-radius:8px; text-decoration:none; color:var(--text-sub); }
        .nav-item.active a { background:var(--primary-glass); color:var(--primary); font-weight:700; }

        .project-indicator { margin: 20px 12px; padding: 12px; background: var(--primary-glass); border: 1px solid var(--primary-border); border-radius: 8px; display: flex; flex-direction: column; gap: 4px; }
        .indicator-label { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--primary); font-weight: 600; }
        .project-indicator strong { font-size: 0.95rem; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; padding-left: 20px; }
    </style>

</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header" data-i18n="app_title"></div>
        <ul class="nav-list">
            <li class="nav-item {% if request.path == '/syntax' %}active{% endif %}">
                <a href="/syntax"><span data-i18n="nav_syntax_config"></span></a>
            </li>
            <li class="nav-item {% if request.path == '/ipa' %}active{% endif %}">
                <a href="/ipa"><span data-i18n="nav_ipa_system"></span></a>
            </li>
            <li class="nav-item {% if request.path == '/ipa_management' %}active{% endif %}">
                <a href="/ipa_management"><span data-i18n="nav_ipa_management"></span></a>
            </li>
            <li class="nav-item {% if request.path == '/lexicon' %}active{% endif %}">
                <a href="/lexicon"><span data-i18n="nav_word_generator"></span></a>
            </li>
            <li class="nav-item {% if request.path == '/dictionary' %}active{% endif %}">
                <a href="/dictionary"><span data-i18n="nav_dictionary"></span></a>
            </li>
            <li class="nav-item {% if request.path == '/projects' %}active{% endif %}">
                <a href="/projects"><span data-i18n="nav_project_management"></span></a>
            </li>
            <li class="nav-item {% if request.path == '/morphology' %}active{% endif %}">
                <a href="/morphology"><span data-i18n="nav_morphology_management"></span></a>
            </li>

            {% if session.get('current_project') %}
            <div class="project-indicator">
                <div class="indicator-label">
                    <span>📍</span>
                    <span data-i18n="label_current_project"></span>
                </div>
                <strong>{{ session.get('current_project') }}</strong>
            </div>
            {% endif %}
        </ul>
    </aside>

    <div class="main">
        <header class="top-bar">
            <div style="font-weight:700;">{% block page_name %}{% endblock %}</div>
            <div class="actions">
                <div class="lang-switcher" style="display: inline-flex; background: #eee; padding: 3px; border-radius: 8px; margin-right: 15px; border: 1px solid var(--border);">
                    <button type="button" onclick="updateLangMode('zh')" class="btn-lang" id="btn-zh" style="padding: 6px 14px; border:none; cursor:pointer; border-radius:6px; font-weight:600; transition:0.2s; font-size:0.75rem;">中</button>
                    <button type="button" onclick="updateLangMode('en')" class="btn-lang" id="btn-en" style="padding: 6px 14px; border:none; cursor:pointer; border-radius:6px; font-weight:600; transition:0.2s; font-size:0.75rem;">EN</button>
                </div>
                {% block actions %}{% endblock %}
            </div>
        </header>

        <div style="padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%;">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script>window.TRANSLATION_URL = "{{ url_for('static', filename='csv/translations.csv') }}";</script>
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
</body>
</html>

{% extends "layout.html" %}

{% block page_name %}
    <span data-i18n="nav_project_management"></span>
{% endblock %}

{% block content %}
<div class="card">
    <div class="section-header">
        <h2>✨ 建立新專案</h2>
    </div>
    <form action="/projects" method="POST" style="display: flex; gap: 10px; align-items: flex-end;">
        <div style="flex-grow: 1;">
            <label class="label-caps">專案名稱 (僅限英文字母與數字)</label>
            <input type="text" name="project_name" required 
                   style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border);"
                   placeholder="例如: Elvish_2024">
        </div>
        <button type="submit" class="btn btn-save">建立並切換</button>
    </form>
</div>

<div class="section-header">
    <h2>📂 現有專案列表</h2>
</div>

<div class="grid-flex">
    {% for p in projects %}
    <div class="card" style="width: calc(33.33% - 10px); min-width: 250px; position: relative; border: {% if p == current %}2px solid var(--primary){% else %}1px solid var(--border){% endif %};">
        {% if p == current %}
            <span style="position: absolute; top: 10px; right: 10px; background: var(--primary); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem;">使用中</span>
        {% endif %}
        <h3 style="margin: 0 0 15px 0;">{{ p }}</h3>
        <div style="display: flex; gap: 8px;">
            <a href="{{ url_for('select_project', name=p) }}" class="btn btn-outline" style="flex: 1;">切換至此</a>
        </div>
    </div>
    {% else %}
    <p style="color: var(--text-sub);">目前還沒有任何專案。</p>
    {% endfor %}
</div>
{% endblock %}
